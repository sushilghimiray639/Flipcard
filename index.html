<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find the Win!</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <h1>Find the Win!</h1>

    <div class="game-container">
      <!-- Card 1 -->
      <div class="card" onclick="flipCard(this, 0)">
        <div class="card-inner">
          <div class="card-front">
            <img
              src="https://static.thenounproject.com/png/882164-200.png"
              alt="Card 1"
            />
          </div>
          <div class="card-back"></div>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="card" onclick="flipCard(this, 1)">
        <div class="card-inner">
          <div class="card-front">
            <img
              src="https://static.thenounproject.com/png/882164-200.png"
              alt="Card 2"
            />
          </div>
          <div class="card-back"></div>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="card" onclick="flipCard(this, 2)">
        <div class="card-inner">
          <div class="card-front">
            <img
              src="https://static.thenounproject.com/png/882164-200.png"
              alt="Card 3"
            />
          </div>
          <div class="card-back"></div>
        </div>
      </div>
    </div>

    <button onclick="resetGame()">Shuffle & Reset</button>

    <script src="/script.js"></script>
  </body>
</html>
